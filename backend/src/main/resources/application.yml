server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:therapist_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

python:
  service:
    base-url: ${PYTHON_BASE_URL:http://127.0.0.1:8000}
    text-timeout-seconds: 420
    audio-timeout-seconds: 300
